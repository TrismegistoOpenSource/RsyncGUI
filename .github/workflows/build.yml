name: Build RsyncGUI

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # serve alla release job per pubblicare gli asset

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Prepara build/ dagli asset
        # build/ è in .gitignore, quindi non arriva dal checkout: senza questo
        # Wails se la rigenera con i propri default e l'app esce con l'icona
        # generica invece della nostra. Stessa cosa che fa scripts/build.sh.
        run: |
          mkdir -p build
          cp -R assets/. build/
      - name: Build Apple Silicon
        run: |
          wails build -platform darwin/arm64
          mkdir -p dist
          cp -R build/bin/RsyncGUI.app "dist/RsyncGUI-AppleSilicon.app"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.wails.rsyncgui.arm64" "dist/RsyncGUI-AppleSilicon.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName RsyncGUI-AppleSilicon" "dist/RsyncGUI-AppleSilicon.app/Contents/Info.plist"
          codesign --force --deep --sign - "dist/RsyncGUI-AppleSilicon.app"
      - name: Build Intel
        run: |
          wails build -platform darwin/amd64
          cp -R build/bin/RsyncGUI.app "dist/RsyncGUI-Intel.app"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.wails.rsyncgui.intel" "dist/RsyncGUI-Intel.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName RsyncGUI-Intel" "dist/RsyncGUI-Intel.app/Contents/Info.plist"
          codesign --force --deep --sign - "dist/RsyncGUI-Intel.app"
      - name: Zip per la Release (un .app non è un asset scaricabile da solo)
        # --keepParent è obbligatorio: senza, ditto archivia il CONTENUTO del
        # bundle (Contents/ al primo livello) invece del bundle stesso. Lo zip
        # si scompatta in una cartella con dentro Contents/ e il Finder non
        # vede nessuna app. È il difetto degli asset di v2.1.0.
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent RsyncGUI-AppleSilicon.app RsyncGUI-AppleSilicon-macOS.zip
          ditto -c -k --sequesterRsrc --keepParent RsyncGUI-Intel.app RsyncGUI-Intel-macOS.zip

      - name: Verifica gli zip come li riceve l'utente
        # Non basta che ditto esca con 0: si controlla lo zip scompattandolo,
        # perché è quello che scarica l'utente. Un job verde non garantisce un
        # artefatto giusto.
        run: |
          set -e
          cd dist
          for pair in "RsyncGUI-AppleSilicon:arm64" "RsyncGUI-Intel:x86_64"; do
            name="${pair%%:*}"; want="${pair##*:}"
            rm -rf check && mkdir check
            unzip -q "$name-macOS.zip" -d check
            test -d "check/$name.app" || { echo "FALLITO: $name-macOS.zip non contiene $name.app al primo livello"; ls -la check; exit 1; }
            got=$(lipo -archs "check/$name.app/Contents/MacOS/RsyncGUI")
            test "$got" = "$want" || { echo "FALLITO: $name.app è $got, atteso $want"; exit 1; }
            codesign --verify --deep --strict "check/$name.app"
            echo "OK: $name.app — architettura $got, firma valida"
          done
          rm -rf check
      - uses: actions/upload-artifact@v4
        with:
          name: RsyncGUI-macOS
          path: dist/*.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Prepara build/ dagli asset
        shell: bash # git bash è presente sui runner Windows: stesso comando ovunque
        run: |
          mkdir -p build
          cp -R assets/. build/
      - run: wails build -platform windows/amd64
      - uses: actions/upload-artifact@v4
        with:
          name: RsyncGUI-Windows
          path: build/bin/*.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install Wails Linux dependencies
        # ubuntu-latest (24.04) ha rimosso libwebkit2gtk-4.0-dev a favore
        # della 4.1: il pacchetto 4.0 non esiste più nell'archivio Ubuntu 24.04.
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Prepara build/ dagli asset
        run: |
          mkdir -p build
          cp -R assets/. build/
      # Il tag dice a Wails di cercare via pkg-config "webkit2gtk-4.1" invece
      # del default "webkit2gtk-4.0" (vedi internal/frontend/desktop/linux/gtk.go
      # nel sorgente di Wails: #cgo webkit2_41 pkg-config: webkit2gtk-4.1).
      - run: wails build -platform linux/amd64 -tags webkit2_41
      - name: Package AppImage
        run: |
          set -e
          curl -sSL -o appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          mkdir -p dist RsyncGUI.AppDir/usr/bin
          cp build/bin/RsyncGUI RsyncGUI.AppDir/usr/bin/
          cp build/appicon.png RsyncGUI.AppDir/rsyncgui.png
          cat > RsyncGUI.AppDir/RsyncGUI.desktop <<'DESKTOP'
          [Desktop Entry]
          Name=RsyncGUI
          Exec=RsyncGUI
          Icon=rsyncgui
          Type=Application
          Categories=Utility;
          DESKTOP
          ln -s usr/bin/RsyncGUI RsyncGUI.AppDir/AppRun
          # --appimage-extract-and-run: i runner non hanno FUSE, senza questo
          # appimagetool (che è a sua volta un AppImage) non parte.
          ./appimagetool --appimage-extract-and-run RsyncGUI.AppDir dist/RsyncGUI-x86_64.AppImage
          # anche il binario nudo, per chi non vuole l'AppImage
          cp build/bin/RsyncGUI dist/RsyncGUI-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: RsyncGUI-Linux
          path: dist/*

  # Pubblica una Release vera (pagina permanente, nessun login richiesto) solo
  # quando il push è un tag di versione (es. v2.1.0) — non ad ogni commit.
  release:
    needs: [macos, windows, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Elenca cosa verrà pubblicato
        run: find artifacts -type f
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/RsyncGUI-macOS/*.zip
            artifacts/RsyncGUI-Windows/*.exe
            artifacts/RsyncGUI-Linux/*
          generate_release_notes: true
